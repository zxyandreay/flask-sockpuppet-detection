<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wikipedia Sockpuppet Detection</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">
        <h1>Wikipedia Sockpuppet Detection</h1>
        <p>Enter text to check if it's likely to be a sockpuppet contribution:</p>
        
        <!-- Form for submitting data to the machine learning model -->
        <form action="/predict" method="POST">
            <div class="form-group">
                <textarea class="form-control" id="input_text" name="input_text" rows="4" placeholder="Enter text here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

        <!-- Section to display the interactive plot (after submission and analysis) -->
        <div id="plot" style="margin-top: 20px;">
            <!-- Interactive plot will be inserted here via JavaScript or server-side rendering -->
        </div>
    </div>

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript">
        // JavaScript for handling the form submission and displaying the plot dynamically
    </script>
</body>
</html>
