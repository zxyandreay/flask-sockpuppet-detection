<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #f9f9f9;
        }
        .alert {
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .alert-success {
            background-color: #e9ffd9;
        }
        .alert-danger {
            background-color: #ffd9d9;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>
        {% if prediction %}
            <div class="alert alert-success">
                <h4 class="alert-heading">Prediction Completed!</h4>
                <p>The analysis predicts the following result:</p>
                <hr>
                <p class="mb-0">Likelihood of being a sockpuppet: <strong>{{ prediction }}%</strong></p>
            </div>
        {% else %}
            <div class="alert alert-danger">
                <h4 class="alert-heading">No Prediction Available!</h4>
                <p>There was a problem processing your request.</p>
            </div>
        {% endif %}
        <a href="/" class="btn-primary">Go Back</a>
    </div>
</body>
</html>
