<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            margin: 20px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .alert {
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .alert-success {
            background-color: #e9ffd9;
            border: 1px solid #bada55;
        }
        .alert-danger {
            background-color: #ffd9d9;
            border: 1px solid #ff4d4d;
        }
        a {
            display: inline-block;
            padding: 10px 15px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>
        {% if prediction %}
            <div class="alert alert-success">
                <h4 class="alert-heading">Prediction Completed!</h4>
                <p>The analysis predicts the following result:</p>
                <hr>
                <p class="mb-0">Likelihood of being a sockpuppet: <strong>{{ prediction }}%</strong></p>
            </div>
        {% else %}
            <div class="alert alert-danger">
                <h4 class="alert-heading">No Prediction Available!</h4>
                <p>There was a problem processing your request.</p>
            </div>
        {% endif %}
        <a href="/">Go Back</a>
    </div>
</body>
</html>
