<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wikipedia Sockpuppet Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f0f0, #d9e4f5);
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 25px;
            margin: 20px;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }
        h1 {
            font-weight: 600;
            color: #333;
        }
        p {
            color: #555;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        textarea {
            margin-bottom: 15px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            height: 120px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            padding: 12px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wikipedia Sockpuppet Detector</h1>
        <p>Enter text to check if it's a sockpuppet contribution or not:</p>
        <form action="/predict" method="post">
            <textarea name="input_text" placeholder="Enter text here..."></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
