<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f0f0, #d9e4f5);
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 25px;
            margin: 20px;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }
        h1 {
            font-weight: 600;
            color: #333;
        }
        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-weight: 500;
            color: #333;
        }
        .alert-zero {
            background-color: #d4edda;
            color: #155724;
        }
        .alert-one {
            background-color: #f8d7da;
            color: #721c24;
        }
        a {
            display: inline-block;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
            margin-top: 10px;
        }
        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prediction Result</h1>
        {% if prediction %}
            <div class="alert {% if prediction == 'sockpuppet' %}alert-one{% elif prediction == 'non-sockpuppet' %}alert-zero{% endif %}">
                <h4 class="alert-heading">Prediction Completed!</h4>
                <p>The analysis predicts the following result:</p>
                <hr>
                <p class="mb-0">The comment was made by a <strong>{{ prediction|capitalize }}</strong></p>
            </div>
        {% else %}
            <div class="alert alert-danger">
                <h4 class="alert-heading">No Prediction Available!</h4>
                <p>There was a problem processing your request.</p>
            </div>
        {% endif %}
        <a href="/">Go Back</a>
    </div>
</body>
</html>
